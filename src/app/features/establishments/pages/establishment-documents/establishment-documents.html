<section class="flex flex-col gap-1 sm:flex-row sm:items-start sm:justify-between">
  <div>
    <h1 class="text-2xl font-bold text-base-content">Documentos</h1>
    @if (establishment(); as item) {
    <p class="text-sm text-base-content/60">{{ item.name }}</p>
    }
  </div>
  <div class="flex gap-2">
    <button type="button" class="btn btn-primary btn-sm" (click)="openCreate()">
      <i class="material-symbols-rounded text-[18px]!">add</i>
      Nuevo documento
    </button>
    <a [routerLink]="['/establecimientos', id()]" class="btn btn-ghost btn-sm">
      <i class="material-symbols-rounded text-[18px]!">arrow_back</i>
      Volver al establecimiento
    </a>
  </div>
</section>

<section class="mt-5 mb-6">
  <app-documents-panel [establishmentId]="id()" mode="full" />
</section>

<div class="card bg-base-100 shadow-sm">
  <div class="card-body gap-4">
    <h2 class="font-bold text-base-content">Facturación</h2>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
      <label class="fieldset">
        <span class="label text-xs">Cobro mensual</span>
        <input type="number" step="0.01" class="input w-full" [formField]="billingForm.monthly_bill" />
        @if (billingForm.monthly_bill().invalid() && billingForm.monthly_bill().touched()) {
        <p class="text-error text-xs mt-1">{{ billingForm.monthly_bill().errors()[0].message }}</p>
        }
      </label>

      <label class="fieldset">
        <span class="label text-xs">Método de pago</span>
        <select class="select w-full" [formField]="billingForm.payment_method_id">
          <option value="" disabled>Selecciona un método</option>
          @for (method of paymentMethods(); track method.id) {
          <option [value]="method.id">{{ method.name }}</option>
          }
        </select>
        @if (billingForm.payment_method_id().invalid() && billingForm.payment_method_id().touched()) {
        <p class="text-error text-xs mt-1">{{ billingForm.payment_method_id().errors()[0].message }}</p>
        }
      </label>

      <label class="fieldset">
        <span class="label text-xs">Forma de pago</span>
        <select class="select w-full" [formField]="billingForm.payment_form_id">
          <option value="" disabled>Selecciona una forma</option>
          @for (form of paymentForms(); track form.id) {
          <option [value]="form.id">{{ form.name }}</option>
          }
        </select>
        @if (billingForm.payment_form_id().invalid() && billingForm.payment_form_id().touched()) {
        <p class="text-error text-xs mt-1">{{ billingForm.payment_form_id().errors()[0].message }}</p>
        }
      </label>
    </div>
  </div>
</div>

@if (billingError()) {
<div class="alert alert-error text-sm">{{ billingError() }}</div>
}

<div class="flex flex-col-reverse gap-2 sm:flex-row sm:justify-between">
  <button type="button" class="btn btn-ghost" (click)="back.emit()">Atrás</button>
  <button type="button" class="btn btn-primary" [disabled]="savingBilling()" (click)="save()">
    @if (savingBilling()) { <span class="loading loading-spinner loading-xs"></span> }
    Guardar y continuar
  </button>
</div>

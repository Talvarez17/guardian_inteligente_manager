<dialog #dialogRef class="modal">
  <div class="modal-box w-11/12 max-w-2xl">
    <h3 class="text-lg font-bold text-base-content">{{ editingId() ? 'Editar documento' : 'Nuevo documento' }}</h3>

    <div class="flex flex-col gap-4 mt-4">
      <label class="fieldset">
        <span class="label text-xs">Nombre del documento</span>
        <input type="text" class="input w-full" [formField]="documentForm.name" />
        @if (documentForm.name().invalid() && documentForm.name().touched()) {
        <p class="text-error text-xs mt-1">{{ documentForm.name().errors()[0].message }}</p>
        }
      </label>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <label class="fieldset">
          <span class="label text-xs">Área documental</span>
          <select class="select w-full" [formField]="documentForm.area_id">
            <option value="" disabled>Selecciona un área</option>
            @for (area of areas(); track area.id) {
            <option [value]="area.id">{{ area.area }}</option>
            }
          </select>
          @if (documentForm.area_id().invalid() && documentForm.area_id().touched()) {
          <p class="text-error text-xs mt-1">{{ documentForm.area_id().errors()[0].message }}</p>
          }
        </label>

        <label class="fieldset">
          <span class="label text-xs">Versión</span>
          <input type="text" class="input w-full" [formField]="documentForm.version" />
          @if (documentForm.version().invalid() && documentForm.version().touched()) {
          <p class="text-error text-xs mt-1">{{ documentForm.version().errors()[0].message }}</p>
          }
        </label>

        <div class="fieldset">
          <span class="label text-xs">Fecha de vencimiento</span>
          <div class="dropdown w-full">
            <div tabindex="0" role="button" class="btn btn-outline w-full justify-start font-normal">
              <i class="material-symbols-rounded text-[18px]!">calendar_month</i>
              {{ model().expiration_date || 'Selecciona una fecha' }}
            </div>
            <div tabindex="0" class="dropdown-content z-10 bg-base-100 rounded-box shadow-lg p-2">
              <calendar-date class="cally" [attr.value]="model().expiration_date" (change)="onExpirationChange($event)">
                <calendar-month></calendar-month>
              </calendar-date>
            </div>
          </div>
          @if (expirationInvalid()) {
          <p class="text-error text-xs mt-1">La fecha de vencimiento es requerida</p>
          }
        </div>

        <label class="fieldset">
          <span class="label text-xs">Archivo{{ editingId() ? ' (opcional al editar)' : '' }}</span>
          <input type="file" class="file-input w-full" (change)="onFileSelected($event)" />
          @if (selectedFileName()) {
          <span class="text-xs text-base-content/50 mt-1">{{ selectedFileName() }}</span>
          } @else if (existingFileUrl()) {
          <a [href]="existingFileUrl()" target="_blank" rel="noopener" class="link link-primary text-xs mt-1">Ver archivo actual</a>
          }
          @if (fileInvalid()) {
          <p class="text-error text-xs mt-1">El archivo es requerido</p>
          }
        </label>
      </div>

      <label class="fieldset">
        <span class="label text-xs">Observaciones</span>
        <textarea class="textarea w-full" rows="3" [formField]="documentForm.comments"></textarea>
      </label>

      @if (formError()) {
      <p class="text-error text-xs">{{ formError() }}</p>
      }
    </div>

    <div class="modal-action">
      <button type="button" class="btn btn-ghost" (click)="close()">Cancelar</button>
      <button type="button" class="btn btn-primary" [disabled]="saving()" (click)="save()">
        @if (saving()) { <span class="loading loading-spinner loading-xs"></span> }
        Guardar
      </button>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button>close</button>
  </form>
</dialog>

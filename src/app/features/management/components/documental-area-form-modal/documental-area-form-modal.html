<dialog #dialogRef class="modal">
  <div class="modal-box">
    <h3 class="font-bold text-lg">{{ editingId() ? 'Editar' : 'Nueva' }} área documental</h3>
    <div class="py-4 flex flex-col gap-4">
      <label class="fieldset">
        <span class="label text-xs">Área</span>
        <input type="text" class="input w-full" [formField]="areaForm.area" />
        @if (areaForm.area().invalid() && areaForm.area().touched()) {
        <p class="text-error text-xs mt-1">{{ areaForm.area().errors()[0].message }}</p>
        }
      </label>

      <label class="fieldset">
        <span class="label text-xs">Descripción</span>
        <textarea class="textarea w-full" rows="2" [formField]="areaForm.description"></textarea>
        @if (areaForm.description().invalid() && areaForm.description().touched()) {
        <p class="text-error text-xs mt-1">{{ areaForm.description().errors()[0].message }}</p>
        }
      </label>

      <label class="fieldset">
        <span class="label text-xs">Color</span>
        <app-color-picker [formField]="areaForm.color" />
      </label>

      @if (formError()) {
      <p class="text-error text-xs">{{ formError() }}</p>
      }
    </div>
    <div class="modal-action">
      <button type="button" class="btn btn-ghost" (click)="close()">Cancelar</button>
      <button type="button" class="btn btn-primary" [disabled]="saving()" (click)="save()">
        @if (saving()) { <span class="loading loading-spinner loading-xs"></span> }
        Guardar
      </button>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button>close</button>
  </form>
</dialog>

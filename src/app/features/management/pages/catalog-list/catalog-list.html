@if (adapter(); as a) {

<section class="flex flex-col gap-1 sm:flex-row sm:items-start sm:justify-between">
  <div>
    <h1 class="text-2xl font-bold text-base-content">{{ a.labelPlural }}</h1>
    <p class="text-sm text-base-content/60">Administra todos los registros de este catálogo.</p>
  </div>
  <a routerLink="/gestion" class="btn btn-ghost btn-sm">
    <i class="material-symbols-rounded text-[18px]!">arrow_back</i>
    Volver a gestión
  </a>
</section>

<section class="mt-5 mb-6">
  <app-catalog-crud [adapter]="a" mode="full" />
</section>

} @else {

<section class="card bg-base-100 shadow-sm">
  <div class="card-body items-center gap-3 py-16 text-center">
    <h2 class="font-bold text-base-content">Catálogo no encontrado</h2>
    <a routerLink="/gestion" class="btn btn-primary btn-sm mt-2">Volver a gestión</a>
  </div>
</section>

}

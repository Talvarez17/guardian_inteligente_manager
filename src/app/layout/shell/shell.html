<div class="drawer h-screen w-full bg-base-200 lg:drawer-open">
  <input id="app-drawer" type="checkbox" class="drawer-toggle" [checked]="mobileMenuOpen()" (change)="toggleMobileMenu()" />

  <div class="drawer-content overflow-y-auto">
    <label for="app-drawer" aria-label="Abrir menú"
      class="btn btn-circle btn-sm fixed top-1/2 left-0 z-30 -translate-y-1/2 rounded-l-none border-none bg-base-100 text-secondary shadow-md hover:bg-base-300 lg:hidden">
      <i class="material-symbols-rounded" style="font-size: 0.9rem;">chevron_right</i>
    </label>

    <div class="p-4 sm:p-6 lg:p-8">
      <router-outlet />
    </div>
  </div>

  <div class="drawer-side z-40 overflow-visible!">
    <label for="app-drawer" aria-label="Cerrar menú" class="drawer-overlay"></label>
    <app-sidemenu (closeMobile)="closeMobileMenu()" />
  </div>
</div>
